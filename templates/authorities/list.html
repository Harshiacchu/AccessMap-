{% extends "layout.html" %}
{% block content %}

<div class="hero-card" style="max-width:800px;">
    <h2 class="hero-title">Manage Authorities</h2>

    <a href="/authorities/add" class="glass-btn" style="margin-bottom:20px;">➕ Add New Authority</a>

    <table class="table">
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        {% for a in authorities %}
        <tr>
            <td>{{ a.first_name }} {{ a.last_name }}</td>
            <td>{{ a.email }}</td>
            <td>{{ a.phone }}</td>
            <td>
                <a href="/authorities/edit/{{ a.authority_id }}">Edit</a> |
                <a href="/authorities/delete/{{ a.authority_id }}" 
                   onclick="return confirm('Delete this authority?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
