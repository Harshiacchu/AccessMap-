{% extends "layout.html" %}
{% block content %}

<div class="hero-card" style="max-width:600px;">
    <h2 class="hero-title">Edit Feature</h2>

    <form method="POST">
        <label class="form-label">Feature Type</label>
        <input type="text" name="feature_type" value="{{ feature.feature_type }}" class="glass-input" required>

        <label class="form-label">Description</label>
        <textarea name="description" class="glass-input textarea-fixed">{{ feature.description }}</textarea>

        <button class="glass-btn">Update Feature</button>
    </form>
</div>

{% endblock %}
