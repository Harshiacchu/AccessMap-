{% extends "layout.html" %}
{% block content %}

<div class="hero-card" style="max-width:700px;">
    <h2 class="hero-title">Accessibility Feature Types</h2>

    <a href="/features/add" class="glass-btn" style="margin-top:15px;">
        ➕ Add New Feature Type
    </a>

    <table class="table" style="margin-top:20px;">
        <tr>
            <th>Feature</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>

        {% for f in features %}
        <tr>
            <td>{{ f.feature_type }}</td>
            <td>{{ f.description or '-' }}</td>
            <td>
                <a href="/features/edit/{{ f.feature_id }}">Edit</a> |
                <a href="/features/delete/{{ f.feature_id }}"
                   onclick="return confirm('Delete this feature type?')">
                   Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
